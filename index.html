<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>晨间速览 · 每日资讯</title>
<style>
:root {
  --bg: #f7f3ed;
  --card: #fffdf9;
  --text: #1e1a14;
  --sub: #8a7b6b;
  --accent: #c06e3b;
  --accent-bg: #fdf3ea;
  --border: #e6ded4;
  --tag-bg: #f0ebe3;
  --shadow: 0 1px 6px rgba(30,26,20,.06);
  --sz-bg: #e8f0fe; --sz-text: #3c5aa6;
  --jj-bg: #fef7e0; --jj-text: #b8860b;
  --kj-bg: #eaf5ea; --kj-text: #2d7d46;
  --dt-bg: #f3e8ff; --dt-text: #6b3fa0;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1b1814;
    --card: #25211b;
    --text: #e6ddd2;
    --sub: #9a8b7a;
    --accent: #d4895a;
    --accent-bg: #2d251c;
    --border: #3d362e;
    --tag-bg: #302a23;
    --shadow: 0 1px 6px rgba(0,0,0,.3);
    --sz-bg: #1e2a4a; --sz-text: #8aace0;
    --jj-bg: #3d3520; --jj-text: #e0c060;
    --kj-bg: #1e3d24; --kj-text: #6ab87a;
    --dt-bg: #2d2040; --dt-text: #b08ae0;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;
}
.app{max-width:460px;margin:0 auto;padding:0 16px 48px}

/* header */
.header{padding:24px 0 8px;position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 80%,transparent);display:flex;align-items:flex-end;justify-content:space-between}
.logo{font-size:20px;font-weight:700;letter-spacing:.5px}
.logo span{color:var(--accent)}
.meta-line{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub)}
.dot{width:6px;height:6px;border-radius:50%;background:#4caf50;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.greeting{font-size:26px;font-weight:700;margin:14px 0 6px}

/* tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:6px 0 16px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 15px;border-radius:18px;font-size:13px;white-space:nowrap;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer;transition:.15s;user-select:none}
.tab.active{border-color:transparent}
.tab.sz.active{background:var(--sz-bg);color:var(--sz-text)}
.tab.jj.active{background:var(--jj-bg);color:var(--jj-text)}
.tab.kj.active{background:var(--kj-bg);color:var(--kj-text)}
.tab.dt.active{background:var(--dt-bg);color:var(--dt-text)}
.tab:active{transform:scale(.96)}

/* progress */
.progress{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.progress-item{font-size:11px;padding:3px 10px;border-radius:10px;background:var(--tag-bg);color:var(--sub);display:flex;align-items:center;gap:3px}
.progress-item.done{background:#e8f5e9;color:#2e7d32}
.progress-item.err{background:#fbe9e7;color:#c62828}

/* section */
.section-title{font-size:16px;font-weight:700;margin:4px 0 12px;display:flex;align-items:center;gap:8px}
.section-count{font-size:11px;font-weight:400;padding:2px 8px;border-radius:10px;background:var(--tag-bg);color:var(--sub)}

/* cards */
.news-list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border-radius:12px;padding:14px;box-shadow:var(--shadow);display:block;text-decoration:none;color:inherit;cursor:pointer;transition:.15s;border:1px solid transparent}
.card:active{transform:scale(.985);border-color:var(--accent)}
.card-source{font-size:11px;font-weight:600;margin-bottom:5px}
.card-source.cn{color:var(--sz-text)}.card-source.en{color:var(--accent)}
.card-title{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-desc{font-size:12.5px;color:var(--sub);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{margin-top:8px;font-size:11px;color:var(--sub);display:flex;gap:10px;align-items:center}
.card-meta .trans-badge{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--accent-bg);color:var(--accent)}

/* states */
.state{text-align:center;padding:60px 20px;color:var(--sub);line-height:1.7}
.state-icon{font-size:44px;margin-bottom:10px}
.spin{width:30px;height:30px;margin:0 auto 12px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* footer */
.footer{text-align:center;padding:24px 0;font-size:11px;color:var(--sub);border-top:1px solid var(--border);margin-top:20px}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 20px;border-radius:20px;font-size:13px;z-index:99;opacity:0;pointer-events:none;transition:opacity .25s}
.toast.show{opacity:1}

.pull-hint{text-align:center;padding:10px;font-size:11px;color:var(--sub);opacity:0;transition:opacity .2s}

.refresh-fab{position:fixed;bottom:20px;right:calc(50% - 230px + 16px);width:44px;height:44px;border-radius:50%;background:var(--card);border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;z-index:20;transition:.15s}
.refresh-fab:active{transform:scale(.9)}
@media(min-width:500px){.refresh-fab{right:calc(50% - 230px)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="logo">晨间<span>·</span>速览</div>
      <div class="meta-line"><span class="dot"></span><span id="dateStr"></span><span id="updateTime"></span></div>
      <div class="greeting" id="greeting"></div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="progress" id="progress"></div>
  <div id="content">
    <div class="state"><div class="spin"></div><div>正在聚合今日资讯…</div></div>
  </div>
  <div class="pull-hint" id="pullHint">↓ 下拉刷新</div>
  <div class="footer">预抓取数据 · 外网内容机翻中文<br>每日自动更新</div>
</div>
<div class="toast" id="toast"></div>
<button class="refresh-fab" onclick="refreshData()" title="刷新">⟳</button>

<script>
// ===================== 板块配置 =====================
const PANEL_INFO = {
  shizheng: { name: '时政', cls: 'sz', emoji: '🏛' },
  jingji:   { name: '经济', cls: 'jj', emoji: '💰' },
  keji:     { name: '科技', cls: 'kj', emoji: '🤖' },
  dongxiang:{ name: '动向', cls: 'dt', emoji: '📡' }
};

const DATA_URL = 'news_data.json';
const CACHE_KEY = 'md_cache_v3';
const CACHE_TTL = 6 * 60 * 60 * 1000; // 6 hours

// ===================== 工具 =====================
const $ = s => document.querySelector(s);

function fmtDate(d) {
  const w = ['日','一','二','三','四','五','六'];
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 星期'+w[d.getDay()];
}
function fmtTime(d) { return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

function greet() {
  const h = new Date().getHours();
  if (h < 6) return '夜深了 🌙';
  if (h < 9) return '早上好 ☀️';
  if (h < 12) return '上午好 🌤';
  if (h < 14) return '中午好 ☀️';
  if (h < 18) return '下午好 🌈';
  return '晚上好 🌆';
}

function toast(msg) {
  const el = $('#toast'); el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ===================== 缓存 =====================
function getCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const c = JSON.parse(raw);
    if (Date.now() - c.t > CACHE_TTL) return null;
    return c;
  } catch { return null; }
}
function setCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), d: data })); } catch {}
}

// ===================== 数据加载 =====================
async function loadData() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    return json;
  } catch (e) {
    console.warn('加载JSON失败:', e.message);
    return null;
  }
}

// ===================== 渲染 =====================
let currentTab = 'shizheng';
let allData = {};
let metaInfo = {};

function renderTabs() {
  let html = '';
  for (const [k, p] of Object.entries(PANEL_INFO)) {
    const count = (allData[k] || []).length;
    const show = (k === 'dongxiang') ? '' : (count ? ' · '+count : '');
    html += '<div class="tab '+p.cls+' '+(k===currentTab?'active':'')+'" onclick="switchTab(\''+k+'\')">'+p.emoji+' '+p.name+show+'</div>';
  }
  $('#tabs').innerHTML = html;
}

function renderPanel(panelKey) {
  const items = allData[panelKey] || [];
  const panel = PANEL_INFO[panelKey];
  const el = $('#content');

  if (items.length === 0) {
    if (panelKey === 'dongxiang') {
      el.innerHTML = '<div class="state"><div class="state-icon">📡</div><div>「动向」板块即将上线</div></div>';
    } else {
      el.innerHTML = '<div class="state"><div class="state-icon">📭</div><div>暂无数据<br><small>请检查网络后刷新</small></div></div>';
    }
    return;
  }

  const cards = items.map(item => {
    // Use translated title for display, or fallback to original title (unlikely since data.json has pre-translated)
    const isEN = item._lang === 'en';
    return '\n    <a class="card" href="'+item.link+'" target="_blank" rel="noopener">\n      <div class="card-source '+(isEN?'en':'cn')+'">'+item.source+(isEN?' · 英→中':'')+'</div>\n      <div class="card-title">'+item.title+'</div>\n      '+(item.description?'<div class="card-desc">'+item.description+'</div>':'')+'\n      <div class="card-meta">\n        <span>'+fmtTime(new Date(item.pubDate))+'</span>\n        '+(isEN?'<span class="trans-badge">机翻</span>':'')+'\n        <span style="margin-left:auto;font-size:10px;opacity:.6">原文 →</span>\n      </div>\n    </a>';
  }).join('');

  el.innerHTML = '\n    <div class="section-title">'+panel.emoji+' '+panel.name+'<span class="section-count">'+items.length+'条</span></div>\n    <div class="news-list">'+cards+'</div>\n  ';
}

function switchTab(key) {
  currentTab = key;
  renderTabs();
  renderPanel(key);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===================== 主流程 =====================
async function refreshData(silent) {
  if (!silent) {
    $('#content').innerHTML = '<div class="state"><div class="spin"></div><div>正在加载数据…</div></div>';
  }

  const json = await loadData();
  
  if (json && json.data) {
    allData = json.data;
    metaInfo = json.panels || PANEL_INFO;
    
    // Fill empty panels
    for (const k of Object.keys(PANEL_INFO)) {
      if (!allData[k]) allData[k] = [];
    }
    
    setCache(allData);
    
    const t = json.generated_at ? new Date(json.generated_at) : new Date();
    $('#updateTime').textContent = '· '+fmtTime(t);
    if (!silent) toast('✅ 已更新');
  } else if (!silent) {
    toast('⚠️ 加载失败，使用缓存');
  }

  renderTabs();
  renderPanel(currentTab);
}

async function init() {
  $('#dateStr').textContent = fmtDate(new Date());
  $('#greeting').textContent = greet();

  // Try cache first
  const cache = getCache();
  if (cache && cache.d) {
    allData = cache.d;
    for (const k of Object.keys(PANEL_INFO)) {
      if (!allData[k]) allData[k] = [];
    }
    const t = new Date(cache.t);
    $('#updateTime').textContent = '· '+fmtTime(t)+'（缓存）';
    renderTabs();
    renderPanel(currentTab);
    // Background refresh
    refreshData(true);
  } else {
    await refreshData();
  }
}

// ===================== 下拉刷新 =====================
let ty0 = 0;
document.addEventListener('DOMContentLoaded', () => {
  const hint = $('#pullHint');
  document.addEventListener('touchstart', e => { if (window.scrollY === 0) ty0 = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (ty0 === 0) return;
    const dy = e.touches[0].clientY - ty0;
    if (dy > 50 && window.scrollY === 0) { hint.style.opacity = '1'; hint.textContent = '松手刷新'; }
  }, { passive: true });
  document.addEventListener('touchend', async () => {
    if (hint.style.opacity === '1') { hint.style.opacity = '0'; hint.textContent = '↓ 下拉刷新'; await refreshData(); }
    ty0 = 0;
  });
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !getCache()) refreshData(true);
});

init();
</script>
</body>
</html>
